version: '3.8'\n\nservices:\n  db:\n    image: postgres:latest\n    environment:\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: couples_db\n    volumes:\n      - db_data:/var/lib/postgresql/data\n    healthcheck:\n      test: [ 'CMD', 'pg_isready' ]\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  backend:\n    build: .\n    environment:\n      NODE_ENV: development\n      DB_HOST: db\n      DB_USER: user\n      DB_PASS: password\n      DB_NAME: couples_db\n    volumes:\n      - .:/app\n    ports:\n      - '3000:3000'\n    healthcheck:\n      test: [ 'CMD', 'curl', '-f', 'http://localhost:3000' ]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\nvolumes:\n  db_data:  \